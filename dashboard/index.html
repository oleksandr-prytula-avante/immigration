<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IMMIGRATION RESEARCH DASHBOARD</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="topbar">
        <div>
          <p class="eyebrow">IMMIGRATION RESEARCH</p>
          <h1>COUNTRY DASHBOARD</h1>
        </div>
        <label class="file-button">
          <input id="jsonFile" type="file" accept="application/json,.json">
          UPLOAD JSON
        </label>
      </section>

      <section class="metrics" aria-label="Summary">
        <article>
          <span id="metricTotal">0</span>
          <p>COUNTRIES</p>
        </article>
        <article>
          <span id="metricValid">0</span>
          <p>MATCHES</p>
        </article>
        <article>
          <span id="metricAvgIncome">NOT FOUND</span>
          <p>AVG THRESHOLD, USD</p>
        </article>
      </section>

      <section class="filters" aria-label="Filters">
        <label>
          SEARCH
          <input id="searchInput" type="search" placeholder="PORTUGAL, NOMAD, PR...">
        </label>
        <label>
          STATUS
          <select id="validFilter">
            <option value="all" selected>ALL</option>
            <option value="true">ELIGIBLE</option>
            <option value="false">NOT ELIGIBLE</option>
            <option value="error">ERRORS</option>
          </select>
        </label>
        <label>
          LANGUAGE
          <select id="languageFilter">
            <option value="all">ALL</option>
          </select>
        </label>
        <label>
          MAX INCOME, USD/MO
          <input id="incomeMax" type="number" min="0" step="100" placeholder="E.G. 3500">
        </label>
        <label>
          MAX TAX, %
          <input id="taxMax" type="number" min="0" max="100" step="1" placeholder="E.G. 20">
        </label>
        <label>
          CITIZENSHIP WITHIN, YRS
          <input id="citizenshipMax" type="number" min="0" step="1" placeholder="E.G. 7">
        </label>
        <label>
          JUS SOLI
          <select id="jusSoliFilter">
            <option value="all">ALL</option>
            <option value="yes">YES</option>
            <option value="yes_exceptions">YES / EXCEPTIONS</option>
            <option value="conditional">CONDITIONAL</option>
            <option value="limited">LIMITED</option>
            <option value="no">NO</option>
            <option value="missing">NOT FOUND</option>
          </select>
        </label>
        <label>
          NOMAD STATUS
          <select id="prCitFilter">
            <option value="all">ALL</option>
            <option value="direct">YES</option>
            <option value="switch_needed">SWITCH</option>
            <option value="possible">POSSIBLE</option>
            <option value="unclear">UNCLEAR</option>
            <option value="temporary_only">TEMP ONLY</option>
            <option value="no_nomad_route">NO DNV</option>
          </select>
        </label>
        <label class="checkbox-filter">
          <input id="matchesFilter" type="checkbox" checked>
          <span>MATCHES</span>
        </label>
      </section>

      <section class="status-row">
        <p id="fileStatus">DEMO JSON LOADED. YOU CAN UPLOAD A RESULT FILE.</p>
        <p><span id="visibleCount">0</span> SHOWN</p>
      </section>

      <section class="content-grid">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th data-sort="country">COUNTRY</th>
                <th class="status-col" data-sort="valid">STATUS</th>
                <th class="route-col">ROUTE</th>
                <th class="income-col" data-sort="income">INCOME</th>
                <th data-sort="tax">TAX</th>
                <th class="nomad-col" data-sort="nomadTransition">NOMAD STATUS</th>
                <th data-sort="citizenship">CIT</th>
                <th data-sort="jusSoli">JUS SOLI</th>
              </tr>
            </thead>
            <tbody id="countryRows"></tbody>
          </table>
        </div>

        <aside class="details" id="detailsPanel">
          <p class="empty">SELECT A COUNTRY IN THE TABLE TO SEE DETAILS.</p>
        </aside>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
