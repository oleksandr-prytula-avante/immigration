<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IMMIGRATION RESEARCH DASHBOARD</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="topbar">
        <div>
          <p class="eyebrow">IMMIGRATION RESEARCH</p>
          <h1>COUNTRY DASHBOARD</h1>
        </div>
        <label class="file-button">
          <input id="jsonFile" type="file" accept="application/json,.json">
          UPLOAD JSON
        </label>
      </section>

      <section class="metrics" aria-label="Summary">
        <article>
          <span id="metricTotal">0</span>
          <p>COUNTRIES</p>
        </article>
        <article>
          <span id="metricValid">0</span>
          <p>MATCHES</p>
        </article>
        <article>
          <span id="metricEligiblePath">0</span>
          <p>INTERESTING</p>
        </article>
        <article>
          <span id="metricAvgIncome">NOT FOUND</span>
          <p>AVG THRESHOLD, USD</p>
        </article>
      </section>

      <section class="filters" aria-label="Filters">
        <label>
          SEARCH
          <input id="searchInput" type="search" placeholder="PORTUGAL, NOMAD, PR...">
        </label>
        <label>
          STATUS
          <select id="validFilter">
            <option value="all">ALL</option>
            <option value="true" selected>ELIGIBLE</option>
            <option value="false">NOT ELIGIBLE</option>
            <option value="partial">PARTIAL</option>
            <option value="uncertain">REVIEW</option>
            <option value="error">ERRORS</option>
          </select>
        </label>
        <label>
          LANGUAGE
          <select id="languageFilter">
            <option value="all">ALL</option>
          </select>
        </label>
        <label>
          MAX INCOME, USD/MO
          <input id="incomeMax" type="number" min="0" step="100" placeholder="E.G. 3500">
        </label>
        <label>
          MAX TAX, %
          <input id="taxMax" type="number" min="0" max="100" step="1" placeholder="E.G. 20">
        </label>
        <label>
          CITIZENSHIP WITHIN, YRS
          <input id="citizenshipMax" type="number" min="0" step="1" placeholder="E.G. 7">
        </label>
        <label>
          CITIZENSHIP TRACK
          <select id="citizenshipTrackFilter">
            <option value="all">ALL</option>
            <option value="strong_citizenship_track">STRONG</option>
            <option value="possible_with_conversion">CONVERSION NEEDED</option>
            <option value="weak_or_uncertain_citizenship_track">WEAK / UNCERTAIN</option>
            <option value="temporary_nomad_only">NOMAD ONLY</option>
            <option value="not_valid">NOT VALID</option>
            <option value="missing">NOT FOUND</option>
          </select>
        </label>
        <label class="checkbox-filter">
          <input id="fullyMatchedFilter" type="checkbox" checked>
          <span>INTERESTING</span>
        </label>
      </section>

      <section class="status-row">
        <p id="fileStatus">DEMO JSON LOADED. YOU CAN UPLOAD A RESULT FILE.</p>
        <p><span id="visibleCount">0</span> SHOWN</p>
      </section>

      <section class="content-grid">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th class="number-col">#</th>
                <th data-sort="country">COUNTRY</th>
                <th class="status-col" data-sort="valid">STATUS</th>
                <th data-sort="income">INCOME</th>
                <th data-sort="tax">TAX</th>
                <th data-sort="citizenship">CITIZENSHIP</th>
                <th data-sort="jusSoli">JUS SOLI</th>
                <th data-sort="citizenshipTrack">CITIZENSHIP TRACK</th>
                <th class="route-col">ROUTE</th>
              </tr>
            </thead>
            <tbody id="countryRows"></tbody>
          </table>
        </div>

        <aside class="details" id="detailsPanel">
          <p class="empty">SELECT A COUNTRY IN THE TABLE TO SEE DETAILS.</p>
        </aside>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
